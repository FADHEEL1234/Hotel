services:
  - type: web
    name: hotel
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn Tourism.wsgi:application --chdir Tourism
    envVars:
      - key: DEBUG
        value: "0"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ${RENDER_EXTERNAL_HOSTNAME}
      - key: DATABASE_URL
        fromDatabase:
          name: hotel-db
          property: connectionString

databases:
  - name: hotel-db
    plan: free
