{% extends "base.html" %}

{% block title %}Set New Password | Tourism{% endblock %}

{% block content %}
  <div class="card" style="max-width: 520px; margin: 0 auto;">
    <h2 style="margin-top: 0;">Set a new password</h2>
    <form method="post" style="display: grid; gap: 12px; margin-top: 16px;">
      {% csrf_token %}
      <label>
        New password
        <input
          type="password"
          name="new_password1"
          autocomplete="new-password"
          required
          style="width: 100%; padding: 11px; margin-top: 6px; border-radius: 10px; border: 1px solid var(--line);"
        />
      </label>
      <label>
        Confirm new password
        <input
          type="password"
          name="new_password2"
          autocomplete="new-password"
          required
          style="width: 100%; padding: 11px; margin-top: 6px; border-radius: 10px; border: 1px solid var(--line);"
        />
      </label>
      <button class="btn" type="submit">Update password</button>
    </form>
  </div>
{% endblock %}
