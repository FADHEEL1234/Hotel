services:
  - type: web
    name: medical-system-vsjc
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn Tourism.wsgi:application --chdir Tourism
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: medical-system-vsjc.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: tourism-db
          property: connectionString

databases:
  - name: tourism-db
    plan: free
