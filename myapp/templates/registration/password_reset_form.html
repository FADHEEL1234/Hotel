{% extends "base.html" %}

{% block title %}Reset Password | Tourism{% endblock %}

{% block content %}
  <div class="card" style="max-width: 520px; margin: 0 auto;">
    <h2 style="margin-top: 0;">Reset your password</h2>
    <p class="muted">Enter your email and we will send a reset link.</p>

    <form method="post" style="display: grid; gap: 12px; margin-top: 16px;">
      {% csrf_token %}
      <label>
        Email address
        <input
          type="email"
          name="email"
          autocomplete="email"
          required
          style="width: 100%; padding: 11px; margin-top: 6px; border-radius: 10px; border: 1px solid var(--line);"
        />
      </label>
      <button class="btn" type="submit">Send reset link</button>
    </form>
  </div>
{% endblock %}
